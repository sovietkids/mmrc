<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>秘密コマンド</title>
    <link rel="icon" href="MCAqua.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00ffff;
            --secondary-color: #ff5e00;
            --background-color: #0a0a1a;
            --glass-bg: rgba(10, 10, 26, 0.6);
            --border-color: rgba(0, 255, 255, 0.5);
            --text-color: #e0e0e0;
            --error-color: #ff3300;
            --success-color: #00ff00;
        }

        body {
            margin: 0;
            background-color: var(--background-color);
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(to right, var(--border-color) 1px, var(--background-color) 1px);
            background-size: 40px 40px;
            color: var(--text-color);
            font-family: 'Orbitron', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-shadow: 0 0 3px rgba(0, 255, 255, 0.7);
        }

        .auth-container {
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            padding: 40px;
            text-align: center;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.2) inset, 0 0 15px rgba(0, 0, 0, 0.5);
            animation: fadeIn 1.5s ease-in-out;
        }

        h1 {
            color: var(--primary-color);
            text-shadow: 0 0 10px var(--primary-color);
            margin-top: 0;
        }

        #pwd {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--primary-color);
            font-family: 'Orbitron', sans-serif;
            font-size: 1em;
            padding: 10px;
            margin: 20px 0;
            width: 250px;
            text-align: center;
            outline: none;
        }

        #pwd:focus {
            box-shadow: 0 0 15px var(--primary-color) inset;
        }

        button {
            background-color: transparent;
            color: var(--primary-color);
            padding: 10px 20px;
            border: 1px solid var(--primary-color);
            cursor: pointer;
            font-size: 1em;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 5px var(--primary-color);
            transition: all 0.3s ease;
        }

        button:hover {
            background-color: var(--primary-color);
            color: var(--background-color);
            box-shadow: 0 0 20px var(--primary-color);
            text-shadow: none;
        }

        #msg {
            margin-top: 20px;
            height: 20px;
            font-weight: bold;
        }

        #msg.success { color: var(--success-color); text-shadow: 0 0 8px var(--success-color); }
        #msg.error { color: var(--error-color); text-shadow: 0 0 8px var(--error-color); }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
  <h1>GoKuHi PAGE GATE</h1>
  <input id="pwd" type="password" placeholder="パスワードを入力" style="font-size:16px;padding:6px;">
  <button id="btn" style="font-size:16px;padding:6px 10px;">実行</button>
  <p id="msg" style="font-weight:bold"></p>
    </div>
    <script>
  const DEBUG = false;

  (function () {
    const ok1 = atob("bWFubWFydTMyMTk=");
    const ok2 = atob("bWFubm1hcnUzMjE5");

    if (DEBUG) {
      console.log("DEBUG: ok1=", ok1, " ok2=", ok2);
    }

    const input = document.getElementById("pwd");
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");

    btn.addEventListener("click", checkAndRun);

    // Enter でも送れるようにする
    input.addEventListener("keydown", function(e){
      if (e.key === "Enter") checkAndRun();
    });

    function checkAndRun(){
      const val = input.value || "";
      if (val === ok1 || val === ok2) {
        msg.textContent = "✅ 成功！秘密モード起動！";
        location.href = "gokuhi_.html";
      } else {
        msg.textContent = "❌ パスワードが違います。";
      }
    }
  })();
    </script>
</body>
</html>
