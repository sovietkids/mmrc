<html>
    <head>
        <meta charset="UTF-8">
        <title>Gokuhi Page</title>
        <link rel="icon" href="MCAqua.ico">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
        <!-- External Libraries for Ultimate Flashiness -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
        <script>
            if (localStorage.getItem('gokuhi_authenticated') !== 'true') {
                location.href = 'gokuhi.html';
            }
        </script>
        <style>
            :root {
                --primary-color: #00ffff;
                --secondary-color: #ff5e00;
                --background-color: #0a0a1a;
                --glass-bg: rgba(10, 10, 26, 0.6);
                --border-color: rgba(0, 255, 255, 0.5);
                --text-color: #e0e0e0;
            }

            body {
                margin: 0;
                background-color: var(--background-color); /* Fallback */
                background-size: 40px 40px;
                color: var(--text-color);
                font-family: 'Orbitron', sans-serif;
                overflow-y: auto;
                padding: 20px;
                cursor: crosshair;
                perspective: 1000px; /* For 3D transforms */
            }

            #webgl-bg {
                position: fixed;
                top: 0;
                left: 0;
                width: 100vw;
                height: 100vh;
                z-index: -1;
                opacity: 0.7;
            }

            .container {
                max-width: 1200px;
                margin: 40px auto;
                padding: 0 20px;
                text-align: center;
                position: relative;
                z-index: 2;
            }

            h1 {
                color: var(--primary-color);
                text-shadow: 0 0 10px var(--primary-color);
                animation: pulse 2.5s infinite;
                opacity: 85; /* For anime.js */
            }

            .video-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
                gap: 24px;
                margin-top: 40px;
            }

            .card {
                background: var(--glass-bg);
                backdrop-filter: blur(8px);
                border: 1px solid var(--border-color);
                padding: 16px;
                box-shadow: 0 0 25px rgba(0, 255, 255, 0.2) inset, 0 0 15px rgba(0, 0, 0, 0.5);
                position: relative;
                overflow: hidden;
                transition: transform 0.4s ease, box-shadow 0.4s ease;
            }

            .card:hover {
                transform: translateY(-15px) scale(1.03); /* vanilla-tilt.js will handle rotation */
                box-shadow: 0 0 40px rgba(0, 255, 255, 0.4), 0 0 20px rgba(0, 0, 0, 0.5);
            }

            .card::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 3px;
                background: linear-gradient(90deg, transparent, var(--primary-color));
                animation: border-flow 4s linear infinite;
                box-shadow: 0 0 10px var(--primary-color);
            }

            .video-wrapper {
                position: relative;
                padding-bottom: 56.25%; /* 16:9 aspect ratio */
                height: 0;
                overflow: hidden;
            }

            iframe {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                border: none;
            }

            .logout-button {
                position: fixed;
                bottom: 15px;
                right: 15px;
                z-index: 100;
                background: var(--glass-bg);
                border: 1px solid var(--secondary-color);
                color: var(--secondary-color);
                padding: 8px 12px;
                cursor: pointer;
                font-family: 'Orbitron', sans-serif;
                opacity: 0.7;
                transition: all 0.3s ease;
            }
            .logout-button:hover {
                opacity: 1;
                box-shadow: 0 0 25px var(--secondary-color), 0 0 10px white;
                transform: scale(1.1);
            }

            @keyframes pulse {
                0% { text-shadow: 0 0 10px var(--primary-color); }
                50% { text-shadow: 0 0 25px var(--primary-color); }
                100% { text-shadow: 0 0 10px var(--primary-color); }
            }

            @keyframes border-flow {
                0% { left: -100%; }
                100% { left: 100%; }
            }
        </style>
        <script>
            // --- Sound Effects ---
            const sfx = {
                hover: new Audio('https://cdn.jsdelivr.net/gh/manzdev/code-projects/js-tetris/assets/audio/select.mp3'),
                logout: new Audio('https://cdn.jsdelivr.net/gh/manzdev/code-projects/js-tetris/assets/audio/gameover.mp3'),
                boot: new Audio('https://cdn.pixabay.com/download/audio/2022/03/10/audio_e7b6821a36.mp3?filename=booting-up-a-computer-6399.mp3'),
                typing: new Audio('https://cdn.pixabay.com/download/audio/2022/02/07/audio_71135a8693.mp3?filename=typing-on-a-keyboard-14414.mp3')
            };
            sfx.hover.volume = 0.5;
            sfx.logout.volume = 0.5;

            document.addEventListener('DOMContentLoaded', (event) => {
                // --- 3D Background ---
                let scene, camera, renderer, composer, particles;
                const mouse = new THREE.Vector2();

                function init3D() {
                    const container = document.getElementById('webgl-bg');
                    scene = new THREE.Scene();
                    camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                    camera.position.z = 50;

                    renderer = new THREE.WebGLRenderer({ alpha: true });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    container.appendChild(renderer.domElement);

                    // Particles
                    const particleCount = 20000;
                    const geometry = new THREE.BufferGeometry();
                    const positions = new Float32Array(particleCount * 3);
                    for (let i = 0; i < particleCount * 3; i++) {
                        positions[i] = (Math.random() - 0.5) * 200;
                    }
                    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                    const material = new THREE.PointsMaterial({
                        color: new THREE.Color(0x00ffff),
                        size: 0.1,
                        transparent: true,
                        blending: THREE.AdditiveBlending
                    });
                    particles = new THREE.Points(geometry, material);
                    scene.add(particles);

                    // Post-processing (CRT Effect)
                    composer = new THREE.EffectComposer(renderer);
                    composer.addPass(new THREE.RenderPass(scene, camera));

                    // Bloom Pass
                    const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.4, 0.85);
                    composer.addPass(bloomPass);

                    const crtShader = {
                        uniforms: {
                            "tDiffuse": { value: null }, "time": { value: 0.0 }, "scanlineIntensity": { value: 0.3 }, "noiseIntensity": { value: 0.03 }, "vignette": { value: 0.7 }
                        },
                        vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
                        fragmentShader: `
                            uniform sampler2D tDiffuse; uniform float time; uniform float scanlineIntensity; uniform float noiseIntensity; uniform float vignette; varying vec2 vUv;
                            float random(vec2 st) { return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123); }
                            void main() {
                                vec4 color = texture2D(tDiffuse, vUv);
                                float scanline = sin(vUv.y * 800.0) * scanlineIntensity; color.rgb -= scanline;
                                float noise = (random(vUv + time) - 0.5) * noiseIntensity; color.rgb += noise;
                                float dist = distance(vUv, vec2(0.5)); color.rgb *= (1.0 - pow(dist, 2.0) * vignette);
                                gl_FragColor = color;
                            }`
                    };
                    const crtPass = new THREE.ShaderPass(crtShader);
                    composer.addPass(crtPass);

                    window.addEventListener('resize', onWindowResize, false);
                    document.addEventListener('mousemove', onMouseMove, false);
                    animate();
                }

                function onWindowResize() {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    composer.setSize(window.innerWidth, window.innerHeight);
                }

                function onMouseMove(event) {
                    mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                    const hue = (event.clientX / window.innerWidth);
                    particles.material.color.setHSL(hue, 1.0, 0.5);
                }

                function animate() {
                    requestAnimationFrame(animate);
                    particles.rotation.x += 0.0001 + (mouse.y * 0.0005);
                    particles.rotation.y += 0.0002 + (mouse.x * 0.0005);
                    composer.passes[1].uniforms.time.value += 0.05;
                    composer.render(); // Use composer to render
                }

                init3D();

                sfx.boot.volume = 0.4;
                sfx.boot.play();

                // --- Hacker Text Animation ---
                const textWrapper = document.querySelector('h1');
                textWrapper.innerHTML = textWrapper.textContent.replace(/\S/g, "<span class='letter'>$&</span>");
                anime.timeline({loop: false})
                  .add({
                    targets: 'h1',
                    opacity: [0,1],
                    duration: 50,
                    delay: 500,
                    begin: function() {
                        sfx.typing.loop = true;
                        sfx.typing.play();
                    }
                  })
                  .add({
                    targets: '.letter',
                    opacity: [0,1],
                    duration: 1200,
                    delay: (el, i) => 50 * (i+1),
                    complete: () => sfx.typing.pause()
                  });

                // --- Logout Button ---
                const logoutButton = document.getElementById('logout');
                logoutButton.addEventListener('mouseenter', () => sfx.hover.play());
                logoutButton.addEventListener('click', () => {
                    sfx.logout.play();
                    localStorage.removeItem('gokuhi_authenticated');
                    
                    // Fade out effect before redirecting
                    anime({
                        targets: 'body',
                        opacity: 0,
                        duration: 1000,
                        easing: 'easeOutExpo',
                        complete: () => {
                            location.href = 'gokuhi.html';
                        }
                    });
                });

                // --- Initialize Vanilla Tilt ---
                VanillaTilt.init(document.querySelectorAll(".card"), { max: 15, speed: 400, glare: true, "max-glare": 0.5 });
            });
        </script>
    </head>
    <body>
        <div id="webgl-bg"></div>
        <div class="container">
            <h1>音スポで使ってほしい曲</h1>
            <div class="video-grid">
                <div class="card" data-tilt><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/1-jhJrVdNAg?si=SMPabmaQ1I70mar3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div></div>
                <div class="card" data-tilt><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/Gx1nu832tYE?si=W8VR61QUN2zaq0B6" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div></div>
                <div class="card" data-tilt><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/MQ9UmCLpq2Q?si=8uJhhNRV7MqttSml" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div></div>
                <div class="card" data-tilt><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/m-yMn_Kp4Is?si=BdSMY-IZjuVWGGCE" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe></div></div>
            </div>
        </div>
        <button id="logout" class="logout-button">LOGOUT</button>
    </body>
</html>
